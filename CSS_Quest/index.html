<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Quest: Sube de Nivel en CSS</title>
    <!-- Normalizar estilos base -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <!-- Fuente moderna e iterativa (Inter o similar) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>CSS Quest</h1>
            </div>
            
            <!-- Indicador de nivel y barra de progreso -->
            <div class="progress-container hidden" id="progress-container">
                <div class="level-indicator">
                    <span>Nivel <span id="current-level-display">1</span>/10</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Contenedor dinámico donde se inyectará cada juego -->
    <main id="game-container" class="container">
        <!-- El contenido será renderizado aquí por script.js -->
    </main>

    <!-- Modal/Feedback superpuesto al completar el nivel (Opcional, estilo Duolingo) -->
    <div id="feedback-banner" class="feedback-banner hidden">
        <div class="feedback-content">
            <div class="feedback-text">
                <span class="feedback-icon">🎉</span>
                <span class="feedback-msg">¡Excelente! Desbloqueaste un nuevo concepto.</span>
            </div>
            <button id="next-level-btn" class="btn btn-primary">Siguiente Nivel <span>→</span></button>
        </div>
    </div>

    <!-- Cargar lógica principal -->
    <script src="script.js"></script>
</body>
</html>
