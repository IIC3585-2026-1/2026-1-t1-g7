<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones</title>
    <style>
        .container {
            background: #9b59b6;
            color: #fff;
            width: clamp(100px, 50%, 600px);
            padding: clamp(10px, 5vw, 50px);
            font-size: clamp(16px, 3vw, 24px);
            align-content: center;
            justify-items: center;
        }

        h1 {
            font-size: clamp(10px, 2.35vw + 8.48px, 40px)
        }
    </style>
</head>

<body>
    <h1>Una Demostración de Funciones</h1>
    <p class="container">
        <span class="text">Este titulo se adapta</span>
    </p>
</body>

</html>
