<html>

<head>
    <style>
        div#example1 {
            
                border:solid 1px black;
                width: 100px;
                height: 50px;
        }

        div#example1:hover {
            width: 200px;
            background: #072c53;
            box-shadow: 2px 2px 3px rgba(0, 0, 0, 0.45);
        }

        div#example2 {
            margin-top: 50px;
            border:solid 1px black;
                width: 100px;
                height: 50px;
            transition: all 2s;
        }

        div#example2:hover {
            opacity: 0.2;
            border: none;
        }

    
    </style>
</head>

<body>
    <div id="example1">
        Hover me!
    </div>
    <div id="example2">
        Hover me too!
    </div>
</body>

</html>
