<html>

<head>
    <style>
        .boton-magico {
            padding: 15px 30px;
            margin: 50px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;

            /* Definimos la transición */
            /* Propiedad | Duración | Curva de tiempo */
            transition: all 0.5s ease;
        }

        /* El estado al que queremos llegar */
        .boton-magico:hover {
            background-color: #27ae60;
            transform: scale(1.3);
            /* Se agranda un 30% */
        }
    </style>
</head>

<body>
    <button class="boton-magico">Pásame el mouse</button>
</body>

</html>
